<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test Simple Menu</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
  <div id="navbar-container"></div>
  
  <div style="margin-top: 100px; padding: 20px; max-width: 800px; margin-left: auto; margin-right: auto;">
    <h1 style="font-size: 24px; font-weight: bold; margin-bottom: 20px;">Test Simple du Menu Mobile</h1>
    
    <div style="background: #fef3c7; border-left: 4px solid #f59e0b; padding: 15px; margin-bottom: 20px;">
      <p style="font-weight: bold; margin-bottom: 10px;">📱 Instructions :</p>
      <ol style="margin-left: 20px;">
        <li>Réduisez la largeur du navigateur (< 1280px)</li>
        <li>Cliquez sur le bouton ☰ en haut à droite</li>
        <li>Cliquez sur "Fondation"</li>
        <li>Regardez la console (F12)</li>
      </ol>
    </div>
    
    <div id="test-results" style="background: white; border: 1px solid #ddd; border-radius: 8px; padding: 20px;">
      <p style="font-weight: bold; margin-bottom: 10px;">Résultats du test :</p>
      <div id="results-content">Chargement...</div>
    </div>
  </div>

  <script src="components.js"></script>
  <script>
    console.clear();
    console.log('='.repeat(50));
    console.log('🧪 TEST SIMPLE DU MENU MOBILE');
    console.log('='.repeat(50));
    
    document.addEventListener('DOMContentLoaded', () => {
      console.log('\n1️⃣ Initialisation du menu...');
      initNavbar('test');
      
      setTimeout(() => {
        console.log('\n2️⃣ Vérification des éléments...');
        
        const results = [];
        const menu = document.getElementById('mobile-menu');
        const btn = document.getElementById('mobile-menu-btn');
        
        if (menu) {
          console.log('✅ Menu trouvé');
          results.push('✅ Menu trouvé');
          
          const links = menu.querySelectorAll('a');
          console.log(`✅ ${links.length} liens trouvés`);
          results.push(`✅ ${links.length} liens trouvés`);
          
          // Lister les liens importants
          const importantLinks = ['Fondation', 'Événements', 'Actualités', 'Carrières'];
          console.log('\n3️⃣ Vérification des liens critiques :');
          
          importantLinks.forEach(linkText => {
            const found = Array.from(links).find(l => l.textContent.trim() === linkText);
            if (found) {
              console.log(`✅ "${linkText}" → ${found.href}`);
              results.push(`✅ "${linkText}" trouvé`);
            } else {
              console.log(`❌ "${linkText}" NON TROUVÉ`);
              results.push(`❌ "${linkText}" NON TROUVÉ`);
            }
          });
          
        } else {
          console.log('❌ Menu NON trouvé');
          results.push('❌ Menu NON trouvé');
        }
        
        if (btn) {
          console.log('✅ Bouton menu trouvé');
          results.push('✅ Bouton menu trouvé');
        } else {
          console.log('❌ Bouton menu NON trouvé');
          results.push('❌ Bouton menu NON trouvé');
        }
        
        // Afficher les résultats dans la page
        const resultsDiv = document.getElementById('results-content');
        resultsDiv.innerHTML = results.map(r => `<div style="padding: 5px 0;">${r}</div>`).join('');
        
        console.log('\n4️⃣ Écoute des clics...');
        console.log('👉 Cliquez maintenant sur le menu et testez les liens');
        console.log('='.repeat(50));
        
      }, 1000);
    });
    
    // Écouter TOUS les clics
    document.addEventListener('click', (e) => {
      console.log('\n🖱️ CLIC DÉTECTÉ :');
      console.log('   Target:', e.target);
      console.log('   Tag:', e.target.tagName);
      console.log('   Classes:', e.target.className);
      
      const link = e.target.closest('a');
      if (link) {
        console.log('   ✅ C\'est un lien !');
        console.log('   Texte:', link.textContent.trim());
        console.log('   Href:', link.href);
        
        // NE PAS empêcher la navigation pour voir si ça marche
        console.log('   → Navigation autorisée');
      } else {
        console.log('   ℹ️ Pas un lien');
      }
    }, true);
  </script>
</body>
</html>
